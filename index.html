<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Murder Mystery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100dvh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 20px;
    color: #e94560;
    letter-spacing: 1px;
  }

  /* ---------- Top bar ---------- */
  .top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 10px;
  }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }

  .btn-settings { background: #0f3460; color: #eee; }
  .btn-reset    { background: #e94560; color: #fff; }

  /* ---------- Player grid ---------- */
  .player-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-card {
    background: #16213e;
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }

  .player-card.revealed {
    opacity: 0.45;
  }

  .player-name {
    font-size: 1.15rem;
    font-weight: 600;
  }

  .reveal-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    background: #533483;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .reveal-btn:active { opacity: 0.7; }
  .reveal-btn:disabled {
    background: #444;
    cursor: default;
  }

  .revealed-label {
    font-size: 0.85rem;
    color: #888;
    font-style: italic;
  }

  /* ---------- Empty state ---------- */
  .empty-state {
    text-align: center;
    margin-top: 60px;
    color: #666;
    font-size: 1rem;
    line-height: 1.6;
  }

  /* ---------- Overlay (reveal + settings) ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .overlay-card {
    background: #16213e;
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    padding: 30px 24px;
    position: relative;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: #888;
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
  }
  .close-btn:active { color: #e94560; }

  .reveal-name {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #ccc;
  }

  .reveal-result {
    font-size: 1.5rem;
    font-weight: 800;
    line-height: 1.4;
  }

  .reveal-result.murderer { color: #e94560; }
  .reveal-result.innocent { color: #4ecca3; }

  /* ---------- Settings overlay ---------- */
  .settings-card {
    text-align: left;
    max-width: 400px;
  }

  .settings-card h2 {
    margin-bottom: 12px;
    font-size: 1.2rem;
    color: #e94560;
  }

  .settings-card p {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 10px;
  }

  .settings-card textarea {
    width: 100%;
    min-height: 180px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 8px;
    color: #eee;
    font-size: 1rem;
    padding: 12px;
    resize: vertical;
    font-family: inherit;
  }
  .settings-card textarea:focus {
    outline: none;
    border-color: #533483;
  }

  .settings-save {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .settings-save:active { opacity: 0.7; }
</style>
</head>
<body>

<h1>Murder Mystery</h1>

<div class="top-bar">
  <button class="btn btn-settings" id="settingsBtn">Settings</button>
  <button class="btn btn-reset" id="resetBtn">New Round</button>
</div>

<div id="playerGrid" class="player-grid"></div>
<div id="emptyState" class="empty-state">
  Tap <strong>Settings</strong> to add player names.
</div>

<!-- Overlays injected here -->
<div id="overlayContainer"></div>

<script>
(function () {
  const STORAGE_KEY = 'murder_mystery_names';
  const playerGrid = document.getElementById('playerGrid');
  const emptyState = document.getElementById('emptyState');
  const overlayContainer = document.getElementById('overlayContainer');
  const settingsBtn = document.getElementById('settingsBtn');
  const resetBtn = document.getElementById('resetBtn');

  let names = [];
  let murdererIndex = -1;
  let revealedSet = new Set();

  // --- LocalStorage ---
  function loadNames() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return ['Dad', 'Aurora', 'Maverick', 'Ace', 'Baerett', 'Mom'];
  }

  function saveNames(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  // --- Murderer selection ---
  function chooseMurderer() {
    if (names.length === 0) { murdererIndex = -1; return; }
    murdererIndex = Math.floor(Math.random() * names.length);
  }

  // --- Render ---
  function render() {
    playerGrid.innerHTML = '';
    emptyState.style.display = names.length === 0 ? 'block' : 'none';

    names.forEach(function (name, i) {
      const card = document.createElement('div');
      card.className = 'player-card' + (revealedSet.has(i) ? ' revealed' : '');

      const nameEl = document.createElement('span');
      nameEl.className = 'player-name';
      nameEl.textContent = name;
      card.appendChild(nameEl);

      if (revealedSet.has(i)) {
        const label = document.createElement('span');
        label.className = 'revealed-label';
        label.textContent = 'Revealed';
        card.appendChild(label);
      } else {
        const btn = document.createElement('button');
        btn.className = 'reveal-btn';
        btn.textContent = 'Reveal';
        btn.addEventListener('click', function () { showReveal(i); });
        card.appendChild(btn);
      }

      playerGrid.appendChild(card);
    });
  }

  // --- Reveal overlay ---
  function showReveal(index) {
    const isMurderer = index === murdererIndex;
    revealedSet.add(index);

    const overlay = document.createElement('div');
    overlay.className = 'overlay';

    overlay.innerHTML =
      '<div class="overlay-card">' +
        '<button class="close-btn" aria-label="Close">&times;</button>' +
        '<div class="reveal-name">' + escapeHtml(names[index]) + '</div>' +
        '<div class="reveal-result ' + (isMurderer ? 'murderer' : 'innocent') + '">' +
          (isMurderer
            ? 'You ARE the murderer!'
            : 'You are NOT the murderer.') +
        '</div>' +
      '</div>';

    overlay.querySelector('.close-btn').addEventListener('click', function () {
      overlay.remove();
      render();
    });

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        overlay.remove();
        render();
      }
    });

    overlayContainer.appendChild(overlay);
  }

  // --- Settings overlay ---
  function showSettings() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';

    overlay.innerHTML =
      '<div class="overlay-card settings-card">' +
        '<button class="close-btn" aria-label="Close">&times;</button>' +
        '<h2>Settings</h2>' +
        '<p>Enter one name per line:</p>' +
        '<textarea id="namesInput">' + escapeHtml(names.join('\n')) + '</textarea>' +
        '<button class="settings-save" id="saveNamesBtn">Save &amp; New Round</button>' +
      '</div>';

    function close() { overlay.remove(); }

    overlay.querySelector('.close-btn').addEventListener('click', close);
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) close();
    });

    overlay.querySelector('#saveNamesBtn').addEventListener('click', function () {
      var raw = overlay.querySelector('#namesInput').value;
      names = raw.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
      saveNames(names);
      revealedSet.clear();
      chooseMurderer();
      close();
      render();
    });

    overlayContainer.appendChild(overlay);
    overlay.querySelector('#namesInput').focus();
  }

  // --- Helpers ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // --- Events ---
  settingsBtn.addEventListener('click', showSettings);
  resetBtn.addEventListener('click', function () {
    revealedSet.clear();
    chooseMurderer();
    render();
  });

  // --- Init ---
  names = loadNames();
  chooseMurderer();
  render();
})();
</script>
</body>
</html>
